experiment_name: course_digits_full

data:
  mat_path: data/digits4000.mat
  auto_normalize_01: true

experiment:
  output_dir: outputs/course_digits_full
  seed: 42
  device: auto
  cv_folds: 5
  generate_report_after_run: false

preprocessing:
  methods:
    - raw
    - standard
    - minmax
    - pca
    - standard_pca
  pca_dimensions: [16, 32, 64, 128, 256, 512]

evaluation:
  noise_levels: [0.0, 0.1, 0.2, 0.3, 0.4]

models:
  logistic:
    grid:
      C: [0.01, 0.1, 1.0, 10.0, 100.0]
    train:
      solver: saga
      max_iter: 300
      tol: 0.01
      epochs: 40
      lr: 0.03
      batch_size: 256

  linear_svm:
    grid:
      C: [0.01, 0.1, 1.0, 10.0, 100.0]
    train:
      max_iter: 10000
      tol: 0.001
      epochs: 50
      lr: 0.02
      batch_size: 256
      margin: 1.0

  knn:
    grid:
      n_neighbors: [1, 3, 5, 7, 11]
      weights: [uniform, distance]

report:
  top_k_cases: 5
  highest_noise_for_robustness: 0.4
