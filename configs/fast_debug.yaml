experiment_name: fast_debug

data:
  mat_path: data/synthetic_digits4000.mat
  auto_normalize_01: true

experiment:
  output_dir: outputs/fast_debug
  seed: 7
  device: auto
  cv_folds: 3
  generate_report_after_run: false

preprocessing:
  methods:
    - raw
    - standard
    - pca
    - standard_pca
  pca_dimensions: [16, 32]

evaluation:
  noise_levels: [0.0, 0.2]

models:
  logistic:
    grid:
      C: [0.1, 1.0]
    train:
      epochs: 12
      lr: 0.05
      batch_size: 64

  linear_svm:
    grid:
      C: [0.1, 1.0]
    train:
      epochs: 12
      lr: 0.03
      batch_size: 64
      margin: 1.0

  knn:
    grid:
      n_neighbors: [1, 3]
      weights: [uniform, distance]

report:
  top_k_cases: 4
  highest_noise_for_robustness: 0.2
